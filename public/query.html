<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单查询 - 自动发卡</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">⚡ 自动发卡</a>
      <nav class="nav">
        <a href="/" class="nav-link">返回商城</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="query-box">
      <h2>📦 订单查询</h2>
      <div class="form-group">
        <label class="form-label">订单号</label>
        <input type="text" class="form-input" id="trade-no" placeholder="输入订单号查询">
      </div>
      <button class="btn btn-primary btn-block" onclick="queryOrder()">查询</button>

      <div class="query-result" id="result"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">© 2026 自动发卡平台</div>
  </footer>

  <script>
    // 自动填充 URL 参数
    const params = new URLSearchParams(location.search);
    if (params.get('trade_no')) {
      document.getElementById('trade-no').value = params.get('trade_no');
      queryOrder();
    }

    async function queryOrder() {
      const tradeNo = document.getElementById('trade-no').value.trim();
      if (!tradeNo) return alert('请输入订单号');

      const result = document.getElementById('result');
      try {
        const res = await fetch(`/api/orders/trade/${tradeNo}`);
        if (!res.ok) throw new Error('订单不存在');
        const order = await res.json();

        const statusMap = {
          pending: '<span class="status-pending">待支付</span>',
          paid: '<span class="status-pending">已支付</span>',
          completed: '<span class="status-completed">已完成</span>',
          expired: '<span class="status-expired">已过期</span>'
        };

        let html = `
          <div class="row"><span class="label">订单号</span><span>${order.tradeNo}</span></div>
          <div class="row"><span class="label">商品</span><span>${order.productName}</span></div>
          <div class="row"><span class="label">金额</span><span>¥${order.totalPrice.toFixed(2)}</span></div>
          <div class="row"><span class="label">状态</span>${statusMap[order.status] || order.status}</div>
          <div class="row"><span class="label">时间</span><span>${new Date(order.createdAt).toLocaleString('zh-CN')}</span></div>
        `;

        if (order.status === 'completed' && order.cards.length > 0) {
          html += `<p style="margin-top:1rem;font-weight:600;color:var(--success);">卡密：</p>`;
          order.cards.forEach(c => {
            html += `<div class="card-content">${c}</div>`;
          });
        }

        result.innerHTML = html;
        result.classList.add('show');
      } catch (e) {
        result.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
        result.classList.add('show');
      }
    }

    // 回车查询
    document.getElementById('trade-no').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') queryOrder();
    });
  </script>
</body>
</html>
